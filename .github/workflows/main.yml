name: Scheduled Cleanup

on:
  schedule:
    # Runs every day at midnight UTC (5:30 AM IST)
    - cron: "0 0 * * *"
  workflow_dispatch: # Allows manual trigger from GitHub UI for testing

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old activities and pending projects
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/cron/cleanup" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail \
            --silent \
            --show-error
